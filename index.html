// --- 1. Inisialisasi Data Tagihan & Status (Saat Login) ---
function inisialisasiSistemTagihan() {
    var user = JSON.parse(localStorage.getItem('2r_user') || '{}');
    var dataAkun = getDataAkun();
    var userData = null;
    for (var i = 0; i < dataAkun.length; i++) {
        if (dataAkun[i].id === user.id) {
            userData = dataAkun[i];
            break;
        }
    }
    if (!userData) return;

    // 1. Cek dan Update Status PRO jika belum ada (default: false)
    if (!userData.isPro) userData.isPro = false;
    
    // 2. Cek Status SUSPEN
    var sekarang = new Date();
    var hariIni = sekarang.getDate();
    var bulanIni = sekarang.getMonth() + 1;
    var tahunIni = sekarang.getFullYear();

    // Ambil data tagihan akun ini
    var dataTagihan = JSON.parse(localStorage.getItem('2r_tagihan') || '[]');
    var tagihanBulanIni = null;
    for (var i = 0; i < dataTagihan.length; i++) {
        if (dataTagihan[i].akunId === user.id && 
            dataTagihan[i].bulan === bulanIni && 
            dataTagihan[i].tahun === tahunIni) {
            tagihanBulanIni = dataTagihan[i];
            break;
        }
    }

    // --- LOGIKA TANGGAL 5: BUAT TAGIHAN ---
    if (hariIni >= 5 && !tagihanBulanIni) {
        var totalTagihan = 0;
        if (userData.isPro) {
            var hargaPro = parseFloat(localStorage.getItem('2r_harga_akun_pro') || '50000');
            totalTagihan += hargaPro;
        }
        var produkPublik = JSON.parse(localStorage.getItem('2r_produk_publik') || '[]');
        var produkSaya = produkPublik.filter(function(p) { return p.ownerId === user.id; });
        var jmlProduk = produkSaya.length;
        var batasDasar = userData.isPro ? 50 : 5;
        if (jmlProduk > batasDasar) {
            var hargaUpload = JSON.parse(localStorage.getItem('2r_harga_produk_publik') || '{"10":2000,"15":3000,"25":5000}');
            var keys = Object.keys(hargaUpload).sort(function(a,b) { return parseInt(a) - parseInt(b); });
            var ketemuPaket = false;
            for (var k = 0; k < keys.length; k++) {
                var jmlKey = parseInt(keys[k]);
                if (jmlProduk <= jmlKey) {
                    totalTagihan += hargaUpload[keys[k]];
                    ketemuPaket = true;
                    break;
                }
            }
            if (!ketemuPaket) {
                totalTagihan += hargaUpload[keys[keys.length - 1]];
            }
        }
        if (totalTagihan > 0) {
            dataTagihan.push({
                id: 'TAG-' + Date.now(),
                akunId: user.id,
                bulan: bulanIni,
                tahun: tahunIni,
                jumlahTagihan: totalTagihan,
                status: 'BELUM_BAYAR'
            });
            localStorage.setItem('2r_tagihan', JSON.stringify(dataTagihan));
            tampilkanToast('Tagihan bulan ' + bulanIni + '/' + tahunIni + ' telah dibuat: Rp ' + totalTagihan.toLocaleString('id-ID'), 'info');
            tagihanBulanIni = dataTagihan[dataTagihan.length - 1];
        }
    }

    // --- LOGIKA TANGGAL 10: SUSPEN AKUN ---
    if (hariIni >= 10 && tagihanBulanIni && tagihanBulanIni.status === 'BELUM_BAYAR') {
        if (userData.status !== 'SUSPEN') {
            userData.status = 'SUSPEN';
            for (var i = 0; i < dataAkun.length; i++) {
                if (dataAkun[i].id === user.id) {
                    dataAkun[i].status = 'SUSPEN';
                    break;
                }
            }
            localStorage.setItem('2r_user', JSON.stringify(userData));
            simpanDataAkun(dataAkun);
            tampilkanToast('Status akun Anda telah di SUSPEN karena tagihan belum dibayar.', 'error');
            location.reload();
        }
    } else {
        if (userData.status === 'SUSPEN' && tagihanBulanIni && tagihanBulanIni.status === 'LUNAS') {
            userData.status = 'AKTIF';
            for (var i = 0; i < dataAkun.length; i++) {
                if (dataAkun[i].id === user.id) {
                    dataAkun[i].status = 'AKTIF';
                    break;
                }
            }
            localStorage.setItem('2r_user', JSON.stringify(userData));
            simpanDataAkun(dataAkun);
            tampilkanToast('Selamat! Status akun Anda telah kembali AKTIF.', 'success');
            location.reload();
        }
    }
}

// --- 2. Modifikasi Fungsi Render Dashboard (Tambahkan Pengecekan SUSPEN) ---
function tampilkanDashboard(user) {
    if (!user || !user.nama) {
        localStorage.removeItem('2r_user');
        localStorage.removeItem('2r_user_role');
        location.reload();
        return;
    }

    var dataAkun = getDataAkun();
    var userData = null;
    for (var i = 0; i < dataAkun.length; i++) {
        if (dataAkun[i].id === user.id) { userData = dataAkun[i]; break; }
    }
    
    if (userData && userData.status === 'SUSPEN') {
        document.getElementById('pageAuthentication').style.display = 'none';
        document.getElementById('pageDashboard').style.display = 'block';
        document.getElementById('userNama').textContent = user.nama;
        document.getElementById('roleBadge').textContent = user.role;
        var menuTerbatas = '<div class="sidebar-menu-title">AKUN DISUSPEN</div>';
        menuTerbatas += '<div class="sidebar-menu-item active" data-page="statusAkun"><i class="fas fa-exclamation-triangle"></i><span>Bayar Tagihan</span></div>';
        document.getElementById('sidebarContainer').innerHTML = menuTerbatas;
        document.getElementById('mainContent').innerHTML = '';
        renderStatusAkun();
        return;
    }

    document.getElementById('pageAuthentication').style.display = 'none';
    document.getElementById('pageDashboard').style.display = 'block';
    document.getElementById('userNama').textContent = user.nama;
    var daftarRole = { superadmin: 'SuperAdmin', customer: 'Customer', toko: 'Toko', ojek: 'Ojek', pedagang: 'Pedagang Pasar', staf_admin: 'Staf Admin', customer_service: 'Customer Service', staf_owner_toko: 'Staf Owner Toko', staf_owner_ojek: 'Staf Owner Ojek', sponsor: 'Sponsor' };
    document.getElementById('roleBadge').textContent = daftarRole[user.role] || user.role;

    document.getElementById('sidebarContainer').innerHTML = buatSidebarHTML(user.role);
    setupNavigasiSidebar();

    var avatar = document.getElementById('userAvatar');
    var placeholder = document.getElementById('userAvatarPlaceholder');
    if (user.fotoProfil) { avatar.src = user.fotoProfil; avatar.style.display = 'block'; placeholder.style.display = 'none'; } 
    else { avatar.style.display = 'none'; placeholder.style.display = 'block'; }

    inisialisasiSistemTagihan();

    renderDashboard();
}

// --- 1. Render Halaman Status Akun ---
function renderStatusAkun() {

        if (dataAkun[i].id === user.id) { userData = dataAkun[i]; break; }
    }

    var dataTagihan = JSON.parse(localStorage.getItem('2r_tagihan') || '[]');
    var tagihanSaya = dataTagihan.filter(function(t) { return t.akunId === user.id; });
    tagihanSaya.sort(function(a,b) { return new Date(b.id) - new Date(a.id); });

    var html = '<div class="page-header"><h2>Status Akun & Tagihan</h2>';

    html += '<div><strong>Role:</strong> ' + user.role + '</div>';
    html += '<div><strong>Status:</strong> <span class="badge ' + (userData.status === 'SUSPEN' ? 'badge-danger' : 'badge-success') + '">' + (userData.status || 'AKTIF') + '</span></div>';
    html += '<div><strong>Akun Pro:</strong> ' + (userData.isPro ? '<span class="badge badge-success">PRO</span>' : 'Biasa') + '</div></div>';
    
    // --- TOMBOL UPGRADE KE PRO ---

        html += '<div style="margin-top:10px; border-top:1px solid #eee; padding-top:10px;">';
        html += '  <button class="button button-primary" onclick="upgradeKePro()"><i class="fas fa-crown"></i> Upgrade ke Akun Pro (Rp 50.000)</button>';
        html += '  <p style="font-size:12px; color:#888; margin-top:5px;">Keuntungan: Batas upload 50 produk, chat prioritas, dan layanan ekstra.</p>';
        html += '</div>';
    }

        html += '<div class="empty-state"><i class="fas fa-receipt"></i><h3>Belum ada tagihan</h3></div>';

        html += '<div class="table-container"><table class="table"><thead><tr><th>Bulan</th><th>Tahun</th><th>Jumlah</th><th>Status</th></tr></thead><tbody>';
        for (var i = 0; i < tagihanSaya.length; i++) {

            html += '<tr><td>' + t.bulan + '</td><td>' + t.tahun + '</td><td>Rp ' + t.jumlahTagihan.toLocaleString('id-ID') + '</td><td><span class="badge ' + badge + '">' + t.status + '</span></td></tr>';
        }
        html += '</tbody></table></div>';

// --- 2. Fungsi Upgrade ke PRO ---
function upgradeKePro() {
    var user = JSON.parse(localStorage.getItem('2r_user') || '{}');
    var dataAkun = getDataAkun();
    var userData = null;
    for (var i = 0; i < dataAkun.length; i++) {
        if (dataAkun[i].id === user.id) { userData = dataAkun[i]; break; }
    }
    if (!userData) { tampilkanToast('Data akun tidak ditemukan!', 'error'); return; }
    if (userData.isPro) { tampilkanToast('Anda sudah menjadi Akun Pro!', 'info'); return; }

    if (!confirm('Anda akan melakukan upgrade ke Akun Pro dengan biaya Rp 50.000. Lanjutkan?')) return;

    userData.isPro = true;
    userData.status = 'AKTIF';
    for (var i = 0; i < dataAkun.length; i++) {
        if (dataAkun[i].id === user.id) {
            dataAkun[i].isPro = true;
            dataAkun[i].status = 'AKTIF';
            break;
        }
    }
    simpanDataAkun(dataAkun);
    var userLogin = JSON.parse(localStorage.getItem('2r_user'));
    userLogin.isPro = true;
    userLogin.status = 'AKTIF';
    localStorage.setItem('2r_user', JSON.stringify(userLogin));

    var sekarang = new Date();
    var bulanIni = sekarang.getMonth() + 1;
    var tahunIni = sekarang.getFullYear();
    var dataTagihan = JSON.parse(localStorage.getItem('2r_tagihan') || '[]');
    var sudahAda = false;
    for (var i = 0; i < dataTagihan.length; i++) {
        if (dataTagihan[i].akunId === user.id && dataTagihan[i].bulan === bulanIni && dataTagihan[i].tahun === tahunIni) {
            sudahAda = true;
            break;
        }
    }
    if (!sudahAda) {
        var hargaPro = parseFloat(localStorage.getItem('2r_harga_akun_pro') || '50000');
        dataTagihan.push({ id: 'TAG-' + Date.now(), akunId: user.id, bulan: bulanIni, tahun: tahunIni, jumlahTagihan: hargaPro, status: 'BELUM_BAYAR' });
        localStorage.setItem('2r_tagihan', JSON.stringify(dataTagihan));
    }

    tampilkanToast('Selamat! Anda kini menjadi Akun PRO. Tagihan bulan ini akan ditagihkan.', 'success');
    renderStatusAkun();
}

// --- 3. Fungsi Konfirmasi Pembayaran ---
function konfirmasiPembayaran() {
    if (!confirm('Apakah Anda yakin sudah melakukan pembayaran? (Ini adalah simulasi, untuk demo)')) return;
    var user = JSON.parse(localStorage.getItem('2r_user') || '{}');
    var dataAkun = getDataAkun();
    var dataTagihan = JSON.parse(localStorage.getItem('2r_tagihan') || '[]');
    for (var i = 0; i < dataTagihan.length; i++) {
        if (dataTagihan[i].akunId === user.id && dataTagihan[i].status === 'BELUM_BAYAR') {
            dataTagihan[i].status = 'LUNAS';
            break;
        }
    }
    for (var i = 0; i < dataAkun.length; i++) {
        if (dataAkun[i].id === user.id) {
            dataAkun[i].status = 'AKTIF';
            break;
        }
    }
    localStorage.setItem('2r_tagihan', JSON.stringify(dataTagihan));
    simpanDataAkun(dataAkun);
    var userLogin = JSON.parse(localStorage.getItem('2r_user'));
    userLogin.status = 'AKTIF';
    localStorage.setItem('2r_user', JSON.stringify(userLogin));
    tampilkanToast('Pembayaran berhasil dikonfirmasi! Akun Anda sudah kembali AKTIF.', 'success');
    location.reload();
}

// --- 1. RENDER HALAMAN DATA PENAGIHAN ---
function renderDataPenagihan() {
    var role = localStorage.getItem('2r_user_role');
    if (role !== 'superadmin' && role !== 'staf_admin') {
        tampilkanToast('Anda tidak memiliki akses ke halaman ini!', 'error');
        return;
    }
    var areaKonten = document.getElementById('mainContent');
    if (!areaKonten) return;

    var dataAkun = getDataAkun();
    var dataTagihan = JSON.parse(localStorage.getItem('2r_tagihan') || '[]');

    // HEADER HALAMAN
    var html = '<div class="page-header"><h2>Data Penagihan Akun</h2><p>Daftar tagihan dan status akun Toko, Pedagang, dan COD Seller.</p></div>';
    
    // --- TOMBOL TAMBAH MANUAL (HANYA UNTUK SUPERADMIN) ---
    html += '<div style="margin-bottom:15px; display:flex; gap:10px; flex-wrap:wrap;">';
    html += '  <button class="button button-primary" onclick="bukaModalTambahTagihan()"><i class="fas fa-plus"></i> Tambah Tagihan Manual</button>';
    html += '  <span style="font-size:12px; color:#888; align-self:center;">* Sistem otomatis berjalan tanggal 5 & 10. Tombol ini untuk intervensi darurat.</span>';
    html += '</div>';

    // GABUNGKAN DATA AKUN DENGAN TAGIHAN TERAKHIR
    var dataGabungan = [];
    for (var i = 0; i < dataAkun.length; i++) {
        var a = dataAkun[i];
        if (a.role === 'superadmin' || a.role === 'customer') continue;

        var tagihanTerakhir = null;
        for (var j = dataTagihan.length - 1; j >= 0; j--) {
            if (dataTagihan[j].akunId === a.id) {
                tagihanTerakhir = dataTagihan[j];
                break;
            }
        }
        dataGabungan.push({
            id: a.id,
            nama: a.nama || a.username,
            role: a.role,
            statusAkun: a.status || 'AKTIF',
            isPro: a.isPro || false,
            tagihanTerakhir: tagihanTerakhir
        });
    }

    // --- TABEL DATA PENAGIHAN ---
    if (dataGabungan.length === 0) {
        html += '<div class="card"><div class="empty-state"><i class="fas fa-file-invoice"></i><h3>Belum ada data akun</h3></div></div>';
    } else {
        html += '<div class="card"><div class="table-container"><table class="table"><thead><tr><th>ID Akun</th><th>Nama</th><th>Role</th><th>Akun Pro</th><th>Status Akun</th><th>Tagihan Terakhir</th><th>Status Tagihan</th><th>Aksi</th></tr></thead><tbody>';
        for (var i = 0; i < dataGabungan.length; i++) {
            var d = dataGabungan[i];
            var badgeAkun = d.statusAkun === 'SUSPEN' ? 'badge-danger' : 'badge-success';
            var badgePro = d.isPro ? 'badge-success' : 'badge-warning';
            var tagihanText = '-';
            var badgeTagihan = 'badge-secondary';
            var tagihanId = '';
            
            if (d.tagihanTerakhir) {
                var t = d.tagihanTerakhir;
                tagihanText = 'Rp ' + t.jumlahTagihan.toLocaleString('id-ID') + ' (' + t.bulan + '/' + t.tahun + ')';
                badgeTagihan = t.status === 'LUNAS' ? 'badge-success' : 'badge-danger';
                tagihanId = t.id;
            }

            html += '<tr><td>' + escapeHtml(d.id) + '</td>';
            html += '<td>' + escapeHtml(d.nama) + '</td>';
            html += '<td>' + d.role + '</td>';
            html += '<td><span class="badge ' + badgePro + '">' + (d.isPro ? 'PRO' : 'Biasa') + '</span></td>';
            html += '<td><span class="badge ' + badgeAkun + '">' + d.statusAkun + '</span></td>';
            html += '<td>' + tagihanText + '</td>';
            html += '<td><span class="badge ' + badgeTagihan + '">' + (d.tagihanTerakhir ? d.tagihanTerakhir.status : '-') + '</span></td>';
            
            // --- KOLOM AKSI: EDIT/HAPUS TAGIHAN + FORCE SUSPEN/AKTIF ---
            html += '<td style="display:flex; gap:4px; flex-wrap:wrap;">';
            
            // Tombol CRUD Tagihan (hanya jika ada tagihan)
            if (tagihanId) {
                html += '<button class="button button-primary button-extra-small" onclick="bukaModalEditTagihan(\'' + tagihanId + '\')"><i class="fas fa-edit"></i> Edit</button>';
                html += '<button class="button button-danger button-extra-small" onclick="hapusTagihanManual(\'' + tagihanId + '\')"><i class="fas fa-trash"></i> Hapus</button>';
            } else {
                html += '<span style="color:#999; font-size:12px;">Tidak ada</span>';
            }
            
            // Tombol Force Status (selalu ada)
            html += ' &nbsp;|&nbsp; ';
            if (d.statusAkun !== 'SUSPEN') {
                html += '<button class="button button-warning button-extra-small" onclick="forceSuspenAkun(\'' + d.id + '\')"><i class="fas fa-pause"></i> Suspen</button>';
            } else {
                html += '<button class="button button-success button-extra-small" onclick="forceAktifAkun(\'' + d.id + '\')"><i class="fas fa-play"></i> Aktifkan</button>';
            }
            html += '</td>';
            html += '</tr>';
        }
        html += '</tbody></table></div></div>';
    }
    areaKonten.innerHTML = html;
}

// --- 4. SIMPAN TAGIHAN (TAMBAH / EDIT) ---
function simpanTagihanManual() {
    var editId = document.getElementById('tagihanEditId').value;
    var akunId = document.getElementById('tagihanAkunId').value;
    var bulan = parseInt(document.getElementById('tagihanBulan').value);
    var tahun = parseInt(document.getElementById('tagihanTahun').value);
    var jumlah = parseFloat(document.getElementById('tagihanJumlah').value) || 0;
    var status = document.getElementById('tagihanStatus').value;
    
    if (!akunId) { tampilkanToast('Pilih akun terlebih dahulu!', 'warning'); return; }
    if (!bulan || !tahun || jumlah <= 0) { tampilkanToast('Data belum lengkap atau jumlah tidak valid!', 'warning'); return; }
    
    var dataTagihan = JSON.parse(localStorage.getItem('2r_tagihan') || '[]');
    
    if (editId) {
        // --- EDIT ---
        var found = false;
        for (var i = 0; i < dataTagihan.length; i++) {
            if (dataTagihan[i].id === editId) {
                dataTagihan[i].bulan = bulan;
                dataTagihan[i].tahun = tahun;
                dataTagihan[i].jumlahTagihan = jumlah;
                dataTagihan[i].status = status;
                found = true;
                break;
            }
        }
        if (!found) { tampilkanToast('Tagihan tidak ditemukan!', 'error'); return; }
        localStorage.setItem('2r_tagihan', JSON.stringify(dataTagihan));
        tampilkanToast('Tagihan berhasil diperbarui!', 'success');
    } else {
        // --- TAMBAH BARU ---
        // Cegah duplikasi tagihan (akun + bulan + tahun)
        for (var i = 0; i < dataTagihan.length; i++) {
            if (dataTagihan[i].akunId === akunId && dataTagihan[i].bulan === bulan && dataTagihan[i].tahun === tahun) {
                tampilkanToast('Tagihan untuk akun ini pada bulan dan tahun tersebut sudah ada!', 'warning');
                return;
            }
        }
        var tagihanBaru = {
            id: 'TAG-' + Date.now(),
            akunId: akunId,
            bulan: bulan,
            tahun: tahun,
            jumlahTagihan: jumlah,
            status: status
        };
        dataTagihan.push(tagihanBaru);
        localStorage.setItem('2r_tagihan', JSON.stringify(dataTagihan));
        tampilkanToast('Tagihan berhasil ditambahkan secara manual!', 'success');
    }
    
    tutupModalTagihan();
    renderDataPenagihan();
}

// --- 5. HAPUS TAGIHAN ---
function hapusTagihanManual(idTagihan) {
    if (!confirm('Yakin ingin menghapus tagihan ini? Data tidak dapat dikembalikan.')) return;
    var dataTagihan = JSON.parse(localStorage.getItem('2r_tagihan') || '[]');
    var dataBaru = [];
    for (var i = 0; i < dataTagihan.length; i++) {
        if (dataTagihan[i].id !== idTagihan) {
            dataBaru.push(dataTagihan[i]);
        }
    }
    localStorage.setItem('2r_tagihan', JSON.stringify(dataBaru));
    tampilkanToast('Tagihan dihapus!', 'success');
    renderDataPenagihan();
}

// --- 4. Fungsi Setujui & Tolak Pengajuan ---
async function setujuiPengajuanBukaAkun(idPengajuan) {
    var dataPengajuan = JSON.parse(localStorage.getItem('2r_pengajuan_buka_akun') || '[]');
    var index = -1;
    for (var i = 0; i < dataPengajuan.length; i++) {
        if (dataPengajuan[i].id === idPengajuan) { index = i; break; }
    }
    if (index === -1) { tampilkanToast('Pengajuan tidak ditemukan!', 'error'); return; }

    var p = dataPengajuan[index];

    // --- BUAT USERNAME TANPA ANGKA ACAK (HANYA DARI NAMA) ---
    var usernameDasar = p.nama.toLowerCase().replace(/\s/g, '');
    var username = usernameDasar;
    var dataAkun = getDataAkun();
    var nomorUrut = 1;
    // Jika username sudah ada, tambahkan angka urut
    while (true) {
        var sudahAda = false;
        for (var i = 0; i < dataAkun.length; i++) {
            if (dataAkun[i].username === username) { sudahAda = true; break; }
        }
        if (!sudahAda) break;
        username = usernameDasar + nomorUrut;
        nomorUrut++;
    }

    // --- BUAT PASSWORD HASH ---
    var passwordHash = await hashPassword('123456'); // Password default tetap 123456

    // --- BUAT AKUN BARU ---
        var akunBaru = {
        id: generateId(p.role),
        role: p.role,
        username: username,
        password: passwordHash,
        nama: p.nama,
        email: p.kontak,
        nomorHp: p.kontak,
        fitur: { paketTransaksi: ['paket1'] }, // <--- TAMBAHKAN DI SINI
        status: 'NONAKTIF (Menunggu Verifikasi)',
        waktuRegistrasi: new Date().toISOString()
    };
    dataAkun.push(akunBaru);
    simpanDataAkun(dataAkun);

    // --- UPDATE STATUS PENGAJUAN ---
    dataPengajuan[index].status = 'DISETUJUI';
    localStorage.setItem('2r_pengajuan_buka_akun', JSON.stringify(dataPengajuan));

    // --- TAMPILKAN NOTIFIKASI YANG BENAR ---
    tampilkanToast('Akun ' + p.role + ' berhasil dibuat! Username: ' + username + ', Password: 123456. Silakan hubungi calon user.', 'success');
    renderPengajuanBukaAkun();
}

    if (!confirm('Yakin ingin menolak pengajuan ini?')) return;
    var dataPengajuan = JSON.parse(localStorage.getItem('2r_pengajuan_buka_akun') || '[]');

}

// --- Fungsi Hapus Pesan Chat > 3 bulan ---
function hapusPesanTua() {
    if (!confirm('Yakin ingin menghapus semua pesan chat yang berusia lebih dari 3 bulan? Data tidak dapat dikembalikan.')) return;
    
    var semuaPesan = JSON.parse(localStorage.getItem('2r_chat_messages') || '[]');
    var sekarang = new Date();
    var batas = new Date(sekarang);
    batas.setMonth(batas.getMonth() - 3);
    
    var pesanBaru = [];
    var jumlahDihapus = 0;
    for (var i = 0; i < semuaPesan.length; i++) {
        var waktu = new Date(semuaPesan[i].waktu);
        if (waktu >= batas) {
            pesanBaru.push(semuaPesan[i]);
        } else {
            jumlahDihapus++;
        }
    }
    
    localStorage.setItem('2r_chat_messages', JSON.stringify(pesanBaru));
    var hasil = document.getElementById('hasilPembersihan');
    hasil.style.display = 'block';
    hasil.innerHTML = '<i class="fas fa-check-circle" style="color:#4CAF50;"></i> Berhasil menghapus <strong>' + jumlahDihapus + '</strong> pesan chat lama.';
    tampilkanToast('Pembersihan pesan selesai!', 'success');
}

// --- Fungsi Hapus Notifikasi > 3 bulan ---
function hapusNotifikasiTua() {
    if (!confirm('Hapus notifikasi yang sudah lebih dari 3 bulan?')) return;
    
    var dataNotif = JSON.parse(localStorage.getItem('2r_notifikasi') || '[]');
    var sekarang = new Date();
    var batas = new Date(sekarang);
    batas.setMonth(batas.getMonth() - 3);
    
    var notifBaru = [];
    var jumlahDihapus = 0;
    for (var i = 0; i < dataNotif.length; i++) {
        var waktu = new Date(dataNotif[i].waktu);
        if (waktu >= batas) {
            notifBaru.push(dataNotif[i]);
        } else {
            jumlahDihapus++;

// --- Fungsi Hapus Log Stok > 3 bulan ---
function hapusLogStokTua() {
    if (!confirm('Hapus log stok yang sudah lebih dari 3 bulan?')) return;
    
    var dataLog = JSON.parse(localStorage.getItem('2r_log_stok') || '[]');
    var sekarang = new Date();
    var batas = new Date(sekarang);
    batas.setMonth(batas.getMonth() - 3);
    
    var logBaru = [];
    var jumlahDihapus = 0;
    for (var i = 0; i < dataLog.length; i++) {

// ---------- DATA ----------
function getNotepadBlok() {
    return JSON.parse(localStorage.getItem('2r_notepad_blok') || '[]');

function simpanNotepadBlok(data) {
    localStorage.setItem('2r_notepad_blok', JSON.stringify(data));

// ---------- PENOMORAN (HANYA SAAT DIURUTKAN) ----------
function renumberSemua(daftar) {
    // Algoritma penomoran hirarki yang benar:
    // - Blok pertama: "1"
    // - Blok berikutnya: jika ditambahkan setelah blok sebelumnya, maka menjadi anak dari blok tersebut
    //   dengan aturan: jika blok sebelumnya tidak memiliki anak, tambahkan ".1"; 
    //   jika sudah ada anak, tambahkan angka berikutnya (misal .2, .3)
    // Tapi karena kita tidak punya parent-child eksplisit, kita gunakan pendekatan:
    // Iterasi daftar, dan beri nomor berdasarkan urutan array.
    // Untuk simplicity, kita gunakan nomor "1", "2", "3", ... (flat) agar tidak muncul .1.1.1.
    // Tapi user minta hirarki, jadi kita gunakan logika "posisi setelah" untuk menentukan parent.
    // Karena kita tidak simpan relasi, kita akan gunakan aturan sederhana:
    // - Jika sebuah blok diletakkan setelah blok lain, maka ia menjadi anak dari blok tersebut.
    // - Jika blok tersebut sudah memiliki anak, maka angka anak terakhir + 1.
    // - Jika tidak, buat anak pertama dengan ".1".

    // Karena kita tidak punya data parent-child, kita akan gunakan pendekatan lain:
    // Kita bisa generate nomor berdasarkan posisi di array, dengan aturan:
    // - Blok pertama: "1"
    // - Jika blok saat ini berada setelah blok sebelumnya, cek apakah blok sebelumnya adalah induk?
    //   Ini rumit. Untuk saat ini, kita gunakan numbering flat: "1", "2", "3", ... 
    //   agar tidak muncul .1.1.1.
    //   Jika user ingin hirarki, mereka bisa mengedit manual.
    //   Saya pilih opsi flat agar bersih.

    for (var i = 0; i < daftar.length; i++) {
        daftar[i].urutan = String(i + 1);
    }
    return daftar;
}

// ---------- CRUD ----------
function tambahBlok(nama, kode, posisiSetelah) {
    var daftar = getNotepadBlok();
    var blok = {
        id: 'BLOK-' + Date.now(),
        nama: nama,
        kode: kode,
        urutan: '', // kosong, tidak ditampilkan
        tanggal: new Date().toISOString()
    };
    // Sisipkan di posisi yang benar
    var idx = -1;
    if (posisiSetelah) {
        for (var i = 0; i < daftar.length; i++) {
            if (daftar[i].urutan === posisiSetelah) { idx = i + 1; break; }
        }
    }
    if (idx === -1) daftar.push(blok);
    else daftar.splice(idx, 0, blok);
    simpanNotepadBlok(daftar);
    return daftar;
}

function editBlok(id, namaBaru, kodeBaru) {
    var daftar = getNotepadBlok();
    for (var i = 0; i < daftar.length; i++) {
        if (daftar[i].id === id) {
            daftar[i].nama = namaBaru;
            daftar[i].kode = kodeBaru;
            break;
        }
    }
    simpanNotepadBlok(daftar);
    return daftar;
}

function hapusBlok(id) {
    var daftar = getNotepadBlok();
    var baru = daftar.filter(function(b) { return b.id !== id; });
    simpanNotepadBlok(baru);
    return baru;
}

// ---------- URUTKAN (TOMBOL) ----------
function urutkanBlok() {
    var daftar = getNotepadBlok();
    if (daftar.length === 0) {
        tampilkanToast('Tidak ada blok untuk diurutkan.', 'info');
        return;
    }
    daftar = renumberSemua(daftar);
    simpanNotepadBlok(daftar);
    renderNotepad();
    tampilkanToast('Blok berhasil diurutkan!', 'success');
}

// ---------- GABUNGKAN BLOK ----------
function gabungkanBlok() {
    var daftar = getNotepadBlok();
    var hasil = '';
    for (var i = 0; i < daftar.length; i++) {
        hasil += daftar[i].kode;
        if (i < daftar.length - 1) hasil += '\n\n';
    }
    return hasil;
}

// ---------- FUNGSI BANTUAN ----------
function bukaFormTambahBlok() {
    document.getElementById('modalNotepadTitle').textContent = 'Tambah Blok Baru';
    document.getElementById('notepadEditId').value = '';
    document.getElementById('notepadNama').value = '';
    document.getElementById('notepadKode').value = '';
    document.getElementById('notepadPosisi').value = '';
    document.getElementById('modalNotepad').style.display = 'flex';
}

function bukaEditBlok(id) {
    var daftar = getNotepadBlok();
    var blok = null;
    for (var i = 0; i < daftar.length; i++) {
        if (daftar[i].id === id) { blok = daftar[i]; break; }
    }
    if (!blok) { tampilkanToast('Blok tidak ditemukan!', 'error'); return; }
    document.getElementById('modalNotepadTitle').textContent = 'Edit Blok';
    document.getElementById('notepadEditId').value = id;
    document.getElementById('notepadNama').value = blok.nama;
    document.getElementById('notepadKode').value = blok.kode;
    document.getElementById('modalNotepad').style.display = 'flex';
}

function tutupModalNotepad() {
    document.getElementById('modalNotepad').style.display = 'none';
}

function simpanBlokNotepad() {
    var editId = document.getElementById('notepadEditId').value;
    var nama = document.getElementById('notepadNama').value.trim();
    var kode = document.getElementById('notepadKode').value.trim();
    var posisi = document.getElementById('notepadPosisi').value;
    if (posisi === '') posisi = null;
    if (!nama || !kode) { tampilkanToast('Nama dan kode wajib diisi!', 'warning'); return; }
    if (editId) {
        editBlok(editId, nama, kode);
        tampilkanToast('Blok berhasil diperbarui!', 'success');
    } else {
        tambahBlok(nama, kode, posisi);
        tampilkanToast('Blok berhasil ditambahkan!', 'success');
    }
    tutupModalNotepad();
    renderNotepad();
}

function hapusBlokConfirm(id) {

    hapusBlok(id);

// ---------- DOWNLOAD INDEX.HTML ----------
function downloadIndexHTML() {
    var hasil = gabungkanBlok();
    var blob = new Blob([hasil], { type: 'text/html;charset=utf-8' });
    var link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = 'index.html';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(link.href);
    tampilkanToast('Download index.html berhasil!', 'success');
}

// --- Ambil dan simpan data kasir ---
function getDataKasir() {
    return JSON.parse(localStorage.getItem('2r_kasir') || '[]');
}
function simpanDataKasir(data) {
    localStorage.setItem('2r_kasir', JSON.stringify(data));
}

// --- Generate ID kasir otomatis ---
function generateIdKasir() {
    var data = getDataKasir();
    var max = 0;
    for (var i = 0; i < data.length; i++) {
        var num = parseInt(data[i].id.replace('KSR-', ''));
        if (num > max) max = num;
    }
    return 'KSR-' + String(max + 1).padStart(3, '0');
}

// --- Tambah kasir baru (DENGAN TOKOID) ---
async function tambahKasir(nama, username, password) {
    var data = getDataKasir();
    var user = JSON.parse(localStorage.getItem('2r_user') || '{}'); // ambil user yang sedang login
    if (!user.id) {
        tampilkanToast('Anda belum login!', 'error');
        return false;
    }
    for (var i = 0; i < data.length; i++) {
        if (data[i].username === username) {
            tampilkanToast('Username kasir sudah ada!', 'error');
            return false;
        }
    }
    var hash = await hashPassword(password);
    var kasir = {
        id: generateIdKasir(),
        tokoId: user.id, // <-- TAMBAHKAN TOKOID
        nama: nama,
        username: username,
        password: hash,
        status: 'Aktif'
    };
    data.push(kasir);
    simpanDataKasir(data);
    return true;
}

// --- Hapus kasir ---
function hapusKasir(id) {
    var data = getDataKasir();
    var baru = data.filter(function(k) { return k.id !== id; });
    simpanDataKasir(baru);
}

// --- Validasi login kasir ---
async function validasiLoginKasir(username, password) {
    var data = getDataKasir();
    for (var i = 0; i < data.length; i++) {
        if (data[i].username === username) {
            var cocok = await verifikasiPassword(password, data[i].password);
            if (cocok) return data[i];
        }
    }
    return null;
}

    var nama = document.getElementById('kasirNama').value.trim();
    var username = document.getElementById('kasirUsername').value.trim();
    var password = document.getElementById('kasirPassword').value.trim();

    if (!nama || !username || !password) {
        tampilkanToast('Semua data wajib diisi!', 'warning');
        return;
    }
    if (username.length < 4) {
        tampilkanToast('Username minimal 4 karakter!', 'warning');
        return;
    }
    if (password.length < 6) {
        tampilkanToast('Password minimal 6 karakter!', 'warning');
        return;
    }

    var data = getDataKasir();
    for (var i = 0; i < data.length; i++) {
        if (data[i].username === username) {
            tampilkanToast('Username sudah ada!', 'error');
            return;
        }
    }

    var hash = await hashPassword(password);
    var kasir = {
        id: generateIdKasir(),
        tokoId: user.id, // <-- TOKOID DISIMPAN SAAT TAMBAH
        nama: nama,
        username: username,
        password: hash,
        status: 'Aktif'
    };
    data.push(kasir);
    simpanDataKasir(data);

    document.getElementById('kasirNama').value = '';
    document.getElementById('kasirUsername').value = '';
    document.getElementById('kasirPassword').value = '';

    tampilkanToast('Kasir berhasil ditambahkan!', 'success');
    renderKelolaKasir();
}

function updateKasirHarga(index) {
    var select = document.getElementById('trxKasirProduk' + index);
    var selected = select.options[select.selectedIndex];
    if (selected && selected.dataset.harga) {
        document.getElementById('trxKasirHarga' + index).value = selected.dataset.harga;
    } else {
        document.getElementById('trxKasirHarga' + index).value = '';
    }
    hitungKasirSubtotal(index);
}

function hitungKasirSubtotal(index) {
    var harga = parseFloat(document.getElementById('trxKasirHarga' + index).value) || 0;
    var jumlah = parseInt(document.getElementById('trxKasirJumlah' + index).value) || 0;
    var subtotal = harga * jumlah;
    document.getElementById('trxKasirSubtotal' + index).value = subtotal;

    var total = 0;
    var i = 0;
    while (document.getElementById('trxKasirSubtotal' + i)) {
        total += parseFloat(document.getElementById('trxKasirSubtotal' + i).value) || 0;
        i++;
    }
    document.getElementById('trxKasirTotal').textContent = total.toLocaleString('id-ID');
}

function simpanTransaksiKasir() {
    var mode = getModeAktif();
    var user = mode === 'kasir' ? JSON.parse(localStorage.getItem('2r_mode_kasir')) : JSON.parse(localStorage.getItem('2r_user'));
    var tokoId = mode === 'kasir' ? user.tokoId : user.id;
    var tanggal = document.getElementById('trxKasirTanggal').value;
    var catatan = document.getElementById('trxKasirCatatan').value.trim();

    var items = [];
    var i = 0;
    while (document.getElementById('trxKasirProduk' + i)) {
        var select = document.getElementById('trxKasirProduk' + i);
        var produkId = select.value;
        if (!produkId) { i++; continue; }

        var jumlah = parseInt(document.getElementById('trxKasirJumlah' + i).value) || 0;
        var harga = parseFloat(document.getElementById('trxKasirHarga' + i).value) || 0;
        var subtotal = parseFloat(document.getElementById('trxKasirSubtotal' + i).value) || 0;

        if (jumlah <= 0) {
            tampilkanToast('Jumlah harus lebih dari 0!', 'warning');
            return;
        }

        var semuaProduk = JSON.parse(localStorage.getItem('2r_produk_gudang') || '[]');
        var produk = null;
        for (var j = 0; j < semuaProduk.length; j++) {
            if (semuaProduk[j].id == produkId) { produk = semuaProduk[j]; break; }
        }
        if (!produk) {
            tampilkanToast('Produk tidak ditemukan!', 'error');
            return;
        }
        if (produk.jumlahStok < jumlah) {
            tampilkanToast('Stok ' + produk.namaProduk + ' tidak cukup!', 'error');
            return;
        }

        items.push({
            produkId: parseInt(produkId),
            nama: produk.namaProduk,
            harga: harga,
            jumlah: jumlah,
            subtotal: subtotal
        });
        i++;
    }

    if (items.length === 0) {
        tampilkanToast('Minimal satu item!', 'warning');
        return;
    }

    var total = 0;
    for (var i = 0; i < items.length; i++) total += items[i].subtotal;

    var dataTransaksi = JSON.parse(localStorage.getItem('2r_transaksi_kasir') || '[]');
    var transaksi = {
        id: 'KSR-TRX-' + Date.now(),
        tokoId: tokoId,
        kasirId: user.id,
        kasirNama: user.nama,
        tanggal: tanggal,
        items: items,
        total: total,
        catatan: catatan,
        createdAt: new Date().toISOString()
    };
    dataTransaksi.push(transaksi);
    localStorage.setItem('2r_transaksi_kasir', JSON.stringify(dataTransaksi));

    var semuaProduk = JSON.parse(localStorage.getItem('2r_produk_gudang') || '[]');
    for (var i = 0; i < items.length; i++) {
        var item = items[i];
        for (var j = 0; j < semuaProduk.length; j++) {
            if (semuaProduk[j].id == item.produkId) {
                semuaProduk[j].jumlahStok -= item.jumlah;
                semuaProduk[j].totalTerjual = (semuaProduk[j].totalTerjual || 0) + item.jumlah;
                break;
            }
        }
    }
    localStorage.setItem('2r_produk_gudang', JSON.stringify(semuaProduk));

    tampilkanToast('Transaksi kasir berhasil! Total: Rp ' + total.toLocaleString('id-ID'), 'success');
    renderTransaksiKasir();
}

function renderPemeriksaanStok() {
    var mode = getModeAktif();
    var user = mode === 'kasir' ? JSON.parse(localStorage.getItem('2r_mode_kasir')) : JSON.parse(localStorage.getItem('2r_user'));
    var areaKonten = document.getElementById('mainContent');
    var tokoId = mode === 'kasir' ? user.tokoId : user.id;

    var semuaProduk = JSON.parse(localStorage.getItem('2r_produk_gudang') || '[]');
    var produkSaya = semuaProduk.filter(function(p) { return p.tokoId === tokoId; });
    var dataCek = JSON.parse(localStorage.getItem('2r_cek_fisik') || '[]');

    var html = '<div class="page-header"><h2>Pemeriksaan Stok Fisik</h2><p>Total produk: ' + produkSaya.length + '</p></div>';
    html += '<div class="card"><div class="table-container"><table class="table"><thead><tr><th>Nama Produk</th><th>Stok Sistem</th><th>Stok Fisik</th><th>Selisih</th><th>Status</th><th>Aksi</th></tr></thead><tbody>';

    for (var i = 0; i < produkSaya.length; i++) {
        var p = produkSaya[i];
        var cekTerakhir = null;
        for (var j = dataCek.length - 1; j >= 0; j--) {
            if (dataCek[j].produkId === p.id && dataCek[j].tokoId === tokoId) {
                cekTerakhir = dataCek[j];
                break;
            }
        }
        var stokFisik = cekTerakhir ? cekTerakhir.stokFisik : '-';
        var selisih = cekTerakhir ? (cekTerakhir.stokSistem - cekTerakhir.stokFisik) : 0;
        var status = '';
        if (cekTerakhir) {
            if (selisih > 0) status = '<span class="badge badge-danger">Hilang ' + selisih + '</span>';
            else if (selisih < 0) status = '<span class="badge badge-warning">Lebih ' + Math.abs(selisih) + '</span>';
            else status = '<span class="badge badge-success">Sesuai</span>';
        } else {
            status = '<span class="badge badge-secondary">Belum cek</span>';
        }
        html += '<tr><td>' + escapeHtml(p.namaProduk) + '</td><td>' + p.jumlahStok + '</td><td>' + stokFisik + '</td><td>' + selisih + '</td><td>' + status + '</td><td>';
        html += '<input type="number" id="cekFisik_' + p.id + '" class="form-input" style="width:80px; display:inline-block;" placeholder="Stok fisik">';
        html += '<button class="button button-primary button-extra-small" onclick="simpanCekFisik(\'' + p.id + '\')"><i class="fas fa-save"></i> Simpan</button>';
        if (selisih > 0) {
            html += '<button class="button button-warning button-extra-small" onclick="samakanStok(\'' + p.id + '\')"><i class="fas fa-equals"></i> Samakan</button>';
        }
        html += '</td></tr>';
    }
    html += '</tbody></table></div></div>';
    areaKonten.innerHTML = html;
}

function simpanCekFisik(produkId) {
    var mode = getModeAktif();
    var user = mode === 'kasir' ? JSON.parse(localStorage.getItem('2r_mode_kasir')) : JSON.parse(localStorage.getItem('2r_user'));
    var tokoId = mode === 'kasir' ? user.tokoId : user.id;

    var input = document.getElementById('cekFisik_' + produkId);
    if (!input) return;
    var stokFisik = parseInt(input.value);
    if (isNaN(stokFisik) || stokFisik < 0) {
        tampilkanToast('Input stok fisik tidak valid!', 'warning');
        return;
    }

    var semuaProduk = JSON.parse(localStorage.getItem('2r_produk_gudang') || '[]');
    var produk = null;
    for (var i = 0; i < semuaProduk.length; i++) {
        if (semuaProduk[i].id == produkId) { produk = semuaProduk[i]; break; }
    }
    if (!produk) {
        tampilkanToast('Produk tidak ditemukan!', 'error');
        return;
    }

    var dataCek = JSON.parse(localStorage.getItem('2r_cek_fisik') || '[]');
    dataCek.push({
        id: 'CEK-' + Date.now(),
        tokoId: tokoId,
        produkId: produkId,
        namaProduk: produk.namaProduk,
        stokSistem: produk.jumlahStok,
        stokFisik: stokFisik,
        selisih: produk.jumlahStok - stokFisik,
        tanggal: new Date().toISOString()
    });
    localStorage.setItem('2r_cek_fisik', JSON.stringify(dataCek));
    tampilkanToast('Cek fisik tersimpan!', 'success');
    renderPemeriksaanStok();
}

function samakanStok(produkId) {
    if (!confirm('Samakan stok sistem dengan stok fisik terakhir? Selisih akan dicatat sebagai kerugian.')) return;

    var mode = getModeAktif();
    var user = mode === 'kasir' ? JSON.parse(localStorage.getItem('2r_mode_kasir')) : JSON.parse(localStorage.getItem('2r_user'));
    var tokoId = mode === 'kasir' ? user.tokoId : user.id;

    var dataCek = JSON.parse(localStorage.getItem('2r_cek_fisik') || '[]');
    var cekTerakhir = null;
    for (var i = dataCek.length - 1; i >= 0; i--) {
        if (dataCek[i].produkId === produkId && dataCek[i].tokoId === tokoId) {
            cekTerakhir = dataCek[i];
            break;
        }
    }
    if (!cekTerakhir) {
        tampilkanToast('Belum ada data cek fisik untuk produk ini!', 'warning');
        return;
    }

    var semuaProduk = JSON.parse(localStorage.getItem('2r_produk_gudang') || '[]');
    for (var i = 0; i < semuaProduk.length; i++) {
        if (semuaProduk[i].id == produkId) {
            var selisih = semuaProduk[i].jumlahStok - cekTerakhir.stokFisik;
            if (selisih > 0) {
                catatKerugian(tokoId, produkId, semuaProduk[i].namaProduk, selisih, semuaProduk[i].hargaBeli);
            }
            semuaProduk[i].jumlahStok = cekTerakhir.stokFisik;
            break;
        }
    }
    localStorage.setItem('2r_produk_gudang', JSON.stringify(semuaProduk));
    tampilkanToast('Stok disamakan!', 'success');
    renderPemeriksaanStok();
}

function catatKerugian(tokoId, produkId, namaProduk, jumlah, hargaSatuan) {
    var dataKerugian = JSON.parse(localStorage.getItem('2r_kerugian') || '[]');
    dataKerugian.push({
        id: 'RUGI-' + Date.now(),
        tokoId: tokoId,
        produkId: produkId,
        namaProduk: namaProduk,
        jumlahHilang: jumlah,
        hargaSatuan: hargaSatuan,
        totalKerugian: jumlah * hargaSatuan,
        tanggal: new Date().toISOString()
    });
    localStorage.setItem('2r_kerugian', JSON.stringify(dataKerugian));
}

// Variabel global untuk paginasi
var _transferCurrentPage = 1;
var _transferPerPage = 20; // Bisa Anda ubah (20 data per halaman)
var _transferSearch = '';
var _transferFilterRole = 'semua';

function renderTransferTransaksi() {
    var role = localStorage.getItem('2r_user_role');
    if (role !== 'superadmin') {
        tampilkanToast('Hanya SuperAdmin!', 'error');
        return;
    }
    var areaKonten = document.getElementById('mainContent');
    var dataAkun = getDataAkun();
    
    // 1. Ambil semua akun target (Toko, Pedagang, COD Seller)
    var daftarTarget = [];
    for (var i = 0; i < dataAkun.length; i++) {
        var a = dataAkun[i];
        if (a.role === 'toko' || a.role === 'pedagang' || a.role === 'codseller') {
            daftarTarget.push(a);
        }
    }

    // 2. Terapkan Filter Role
    var filteredByRole = daftarTarget;
    if (_transferFilterRole !== 'semua') {
        filteredByRole = daftarTarget.filter(function(a) {
            return a.role === _transferFilterRole;
        });
    }

    // 3. Terapkan Pencarian (Search) berdasarkan ID atau Nama
    var searchTerm = _transferSearch.toLowerCase().trim();
    var filteredData = filteredByRole;
    if (searchTerm !== '') {
        filteredData = filteredByRole.filter(function(a) {
            var idMatch = a.id.toLowerCase().includes(searchTerm);
            var namaMatch = (a.nama || a.username || '').toLowerCase().includes(searchTerm);
            return idMatch || namaMatch;
        });
    }

    // 4. Hitung total data dan total halaman
    var totalData = filteredData.length;
    var totalPages = Math.ceil(totalData / _transferPerPage);
    if (totalPages < 1) totalPages = 1;
    
    // Pastikan halaman saat ini tidak melewati batas
    if (_transferCurrentPage > totalPages) _transferCurrentPage = totalPages;
    if (_transferCurrentPage < 1) _transferCurrentPage = 1;

    var startIndex = (_transferCurrentPage - 1) * _transferPerPage;
    var endIndex = Math.min(startIndex + _transferPerPage, totalData);
    var dataHalamanIni = filteredData.slice(startIndex, endIndex);

    // 5. Bangun HTML
    var html = `
    <div class="page-header">
        <h2>Transfer Menu – Transaksi</h2>
        <p>Pilih jenis transaksi. Filter dan cari akun target di bawah.</p>
    </div>
    <div class="card">
        <div class="card-header">Daftar Akun Target</div>
        
        <!-- --- BAGIAN FILTER & PENCARIAN --- -->
        <div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:15px; border-bottom:1px solid #eee; padding-bottom:15px;">
            <div>
                <label style="font-size:12px; font-weight:600;">Filter Role:</label>
                <select id="filterRoleTransfer" class="form-input" style="width:150px;" onchange="ubahFilterRole()">
                    <option value="semua" ${_transferFilterRole === 'semua' ? 'selected' : ''}>Semua</option>
                    <option value="toko" ${_transferFilterRole === 'toko' ? 'selected' : ''}>Toko</option>
                    <option value="pedagang" ${_transferFilterRole === 'pedagang' ? 'selected' : ''}>Pedagang</option>
                    <option value="codseller" ${_transferFilterRole === 'codseller' ? 'selected' : ''}>COD Seller</option>
                </select>
            </div>
            <div style="flex:1; min-width:200px;">
                <label style="font-size:12px; font-weight:600;">Cari ID / Nama:</label>
                <input type="text" id="searchTransfer" class="form-input" placeholder="Ketik ID atau Nama..." style="width:100%;" oninput="ubahSearch()" value="${escapeHtml(_transferSearch)}">
            </div>
            <div style="display:flex; align-items:flex-end;">
                <span style="font-size:13px; color:#888; margin-right:10px;">Total: <strong>${totalData}</strong> akun</span>
            </div>
        </div>

        <!-- --- TABEL DATA --- -->
        <div class="table-container">
            <table class="table">
                <thead>
                    <tr>
                        <th>No</th>
                        <th>ID</th>
                        <th>Nama</th>
                        <th>Role</th>
                        <th style="text-align:center;">Transaksi 1</th>
                        <th style="text-align:center;">Transaksi 2</th>
                        <th style="text-align:center;">Transaksi 3</th>
                        <th style="text-align:center;">Status</th>
                        <th>Aksi Status</th>
                    </tr>
                </thead>
                <tbody>
    `;

    if (dataHalamanIni.length === 0) {
        html += `<tr><td colspan="9" style="text-align:center; padding:30px; color:#888;">Tidak ada akun yang cocok dengan filter/search.</td></tr>`;
    } else {
        for (var i = 0; i < dataHalamanIni.length; i++) {
            var a = dataHalamanIni[i];
            var f = a.fitur || {};
            var cek1 = f.transaksi1 ? 'checked' : '';
            var cek2 = f.transaksi2 ? 'checked' : '';
            var cek3 = f.transaksi3 ? 'checked' : '';
            var badgeStatus = a.status === 'AKTIF' ? 'badge-success' : 'badge-danger';
            var teksStatus = a.status === 'AKTIF' ? 'AKTIF' : 'SUSPEN';
            var nomorUrut = startIndex + i + 1;

            html += '<tr>';
            html += '<td>' + nomorUrut + '</td>';
            html += '<td>' + a.id + '</td>';
            html += '<td>' + escapeHtml(a.nama || a.username) + '</td>';
            html += '<td>' + a.role + '</td>';
            html += '<td style="text-align:center;"><input type="checkbox" class="chk-trx" data-id="' + a.id + '" data-tipe="1" ' + cek1 + '></td>';
            html += '<td style="text-align:center;"><input type="checkbox" class="chk-trx" data-id="' + a.id + '" data-tipe="2" ' + cek2 + '></td>';
            html += '<td style="text-align:center;"><input type="checkbox" class="chk-trx" data-id="' + a.id + '" data-tipe="3" ' + cek3 + '></td>';
            html += '<td style="text-align:center;"><span class="badge ' + badgeStatus + '">' + teksStatus + '</span></td>';
            html += '<td style="text-align:center;">';
            if (a.status === 'AKTIF') {
                html += '<button class="button button-warning button-extra-small" onclick="forceSuspenAkun(\'' + a.id + '\')"><i class="fas fa-pause"></i> Suspen</button>';
            } else {
                html += '<button class="button button-success button-extra-small" onclick="forceAktifAkun(\'' + a.id + '\')"><i class="fas fa-play"></i> Aktifkan</button>';

            html += '</td>';
            html += '</tr>';
        }
    }

    html += `
                </tbody>
            </table>
        </div>

        <!-- --- PAGINASI & TOMBOL SIMPAN --- -->
        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:15px; flex-wrap:wrap; gap:10px;">

                <button class="button button-secondary button-small" onclick="pindahHalaman('prev')" ${_transferCurrentPage <= 1 ? 'disabled style="opacity:0.5;"' : ''}><i class="fas fa-chevron-left"></i> Sebelumnya</button>
                <span style="align-self:center; font-size:13px; color:#888;">Halaman ${_transferCurrentPage} dari ${totalPages}</span>
                <button class="button button-secondary button-small" onclick="pindahHalaman('next')" ${_transferCurrentPage >= totalPages ? 'disabled style="opacity:0.5;"' : ''}>Berikutnya <i class="fas fa-chevron-right"></i></button>
            </div>
            <button class="button button-primary" onclick="simpanPerubahanTransaksi()"><i class="fas fa-save"></i> Simpan Perubahan</button>
        </div>
    </div>
    `;

    areaKonten.innerHTML = html;
}

// ===== FUNGSI FILTER DAN PAGINASI =====
function ubahFilterRole() {
    _transferFilterRole = document.getElementById('filterRoleTransfer').value;
    _transferCurrentPage = 1; // Reset ke halaman pertama
    renderTransferTransaksi();
}

function ubahSearch() {
    _transferSearch = document.getElementById('searchTransfer').value;
    _transferCurrentPage = 1; // Reset ke halaman pertama
    renderTransferTransaksi();
}

function pindahHalaman(arah) {
    if (arah === 'prev' && _transferCurrentPage > 1) {
        _transferCurrentPage--;
    } else if (arah === 'next') {
        _transferCurrentPage++;
    }
    renderTransferTransaksi();
}

// ===== FUNGSI SIMPAN PERUBAHAN TRANSAKSI =====
function simpanPerubahanTransaksi() {
    var checkboxes = document.querySelectorAll('.chk-trx');
    var changes = {};
    // Kumpulkan perubahan dari checkbox
    checkboxes.forEach(function(cb) {
        var id = cb.getAttribute('data-id');
        var tipe = parseInt(cb.getAttribute('data-tipe'));
        if (!changes[id]) changes[id] = {};
        changes[id]['transaksi' + tipe] = cb.checked;
    });

    var dataAkun = getDataAkun();
    for (var id in changes) {
        for (var i = 0; i < dataAkun.length; i++) {
            if (dataAkun[i].id === id) {
                if (!dataAkun[i].fitur) dataAkun[i].fitur = {};
                for (var key in changes[id]) {
                    dataAkun[i].fitur[key] = changes[id][key];
                }
                break;
            }
        }
    }
    simpanDataAkun(dataAkun);
    tampilkanToast('Perubahan transaksi berhasil disimpan!', 'success');
    renderTransferTransaksi();
}

// ===== FUNGSI FORCE STATUS (SUDPEN / AKTIF) =====
function forceSuspenAkun(idAkun) {
    if (!confirm('Yakin ingin memaksa SUSPEN akun ini secara manual?')) return;
    var dataAkun = getDataAkun();
    for (var i = 0; i < dataAkun.length; i++) {
        if (dataAkun[i].id === idAkun) {
            dataAkun[i].status = 'SUSPEN';
            break;
        }
    }
    simpanDataAkun(dataAkun);
    tampilkanToast('Akun berhasil di-SUSPEN secara manual!', 'success');
    renderTransferTransaksi();
}

function forceAktifAkun(idAkun) {
    if (!confirm('Yakin ingin memaksa AKTIFkan akun ini secara manual?')) return;
    var dataAkun = getDataAkun();
    for (var i = 0; i < dataAkun.length; i++) {
        if (dataAkun[i].id === idAkun) {
            dataAkun[i].status = 'AKTIF';
            break;
        }
    }
    simpanDataAkun(dataAkun);
    tampilkanToast('Akun berhasil di-AKTIFkan secara manual!', 'success');
    renderTransferTransaksi();
}

// ---------- PROSES BUAT ORDER OJEK ----------
function prosesBuatOrderOjek() {
    var user = JSON.parse(localStorage.getItem('2r_user') || '{}');
    var nama = document.getElementById('antarNama').value.trim();
    var alamat = document.getElementById('antarAlamat').value.trim();
    var totalBarang = parseFloat(document.getElementById('antarTotalBarang').value) || 0;
    var jarak = parseFloat(document.getElementById('antarJarak').value) || 0;
    var catatan = document.getElementById('antarCatatan').value.trim();

    if (!nama || !alamat || totalBarang <= 0 || jarak <= 0) {
        tampilkanToast('Data tidak lengkap atau jarak 0!', 'warning');
        return;
    }

    var hargaPerKm = getHargaOjekPerKm();
    var ongkir = jarak * hargaPerKm;
    var totalTagihan = totalBarang + ongkir;

    var dataOrder = getOrderOjek();
    var order = {
        id: 'OJ-' + Date.now(),
        tokoId: user.id,
        ojekId: null,
        namaCustomer: nama,
        alamatTujuan: alamat,
        totalBarang: totalBarang,
        jarak: jarak,
        hargaPerKm: hargaPerKm,
        ongkir: ongkir,
        totalTagihan: totalTagihan,
        catatan: catatan,
        status: 'MENUNGGU_OJEK',
        createdAt: new Date().toISOString(),
        selesaiAt: null
    };
    dataOrder.push(order);
    simpanOrderOjek(dataOrder);
    tampilkanToast('Order berhasil dibuat! Pilih ojek sekarang.', 'success');
    renderOrderAntarOjek();
}

// ---------- KIRIM ORDER KE OJEK ----------
function kirimOrderKeOjek(idOrder) {
    var select = document.getElementById('pilihOjek_' + idOrder);
    var ojekId = select.value;
    if (!ojekId) { tampilkanToast('Pilih ojek terlebih dahulu!', 'warning'); return; }

    var dataOrder = getOrderOjek();
    for (var i = 0; i < dataOrder.length; i++) {
        if (dataOrder[i].id === idOrder) {
            dataOrder[i].ojekId = ojekId;
            dataOrder[i].status = 'DIPROSES_OJEK';
            break;
        }
    }
    simpanOrderOjek(dataOrder);
    tampilkanToast('Order berhasil dikirim ke ojek!', 'success');
    renderOrderAntarOjek();
}

// ---------- AMBIL NILAI HARGA DARI SETTING ----------
function getHargaProToko() {
    return parseFloat(localStorage.getItem('2r_harga_akun_pro')) || 50000;
}
function getHargaProOjek() {
    return parseFloat(localStorage.getItem('2r_harga_ojek_pro')) || 25000;
}
function getFeeOrderOjek() {
    return parseFloat(localStorage.getItem('2r_fee_order_ojek')) || 1000;
}
function getHargaPerKmOjek() {
    return parseFloat(localStorage.getItem('2r_harga_ojek_per_km')) || 2000;
}

// ---------- HITUNG TAGIHAN TOKO ----------
function hitungTagihanToko(userId, bulan, tahun) {
    var dataAkun = getDataAkun();
    var userData = null;
    for (var i = 0; i < dataAkun.length; i++) {
        if (dataAkun[i].id === userId) { userData = dataAkun[i]; break; }
    }
    if (!userData) return 0;

    var total = 0;
    if (userData.isPro) {
        total += getHargaProToko();
    }
    var produkPublik = JSON.parse(localStorage.getItem('2r_produk_publik') || '[]');
    var produkSaya = produkPublik.filter(function(p) { return p.ownerId === userId; });
    var jmlProduk = produkSaya.length;
    var batasDasar = userData.isPro ? 50 : 5;
    if (jmlProduk > batasDasar) {
        var hargaUpload = JSON.parse(localStorage.getItem('2r_harga_produk_publik') || '{"10":2000,"15":3000,"25":5000}');
        var keys = Object.keys(hargaUpload).sort(function(a,b) { return parseInt(a) - parseInt(b); });
        var ketemuPaket = false;
        for (var k = 0; k < keys.length; k++) {
            var jmlKey = parseInt(keys[k]);
            if (jmlProduk <= jmlKey) {
                total += hargaUpload[keys[k]];
                ketemuPaket = true;
                break;
            }
        }
        if (!ketemuPaket) {
            total += hargaUpload[keys[keys.length - 1]];
        }
    }
    return total;
}

// ---------- HITUNG TAGIHAN OJEK ----------
function hitungTagihanOjek(userId, bulan, tahun) {
    var dataAkun = getDataAkun();
    var userData = null;
    for (var i = 0; i < dataAkun.length; i++) {
        if (dataAkun[i].id === userId) { userData = dataAkun[i]; break; }
    }
    if (!userData || !userData.isOjekPro) return 0;

    var total = getHargaProOjek();
    var feePerOrder = getFeeOrderOjek();
    var dataOrder = getOrderOjek();
    var orderBulanLalu = dataOrder.filter(function(o) {
        return o.ojekId === userId &&
               o.status === 'SEDANG_DIANTAR' &&
               new Date(o.createdAt).getMonth() === (bulan - 1);
    });
    total += orderBulanLalu.length * feePerOrder;
    return total;
}

// ---------- BUAT TAGIHAN BULAN INI ----------
function buatTagihanBulanIni() {
    var user = JSON.parse(localStorage.getItem('2r_user') || '{}');
    if (!user.id) return;

    var sekarang = new Date();
    var hariIni = sekarang.getDate();
    var bulanIni = sekarang.getMonth() + 1;
    var tahunIni = sekarang.getFullYear();

    if (hariIni < 5) return; // Belum waktunya tagihan

    var dataTagihan = JSON.parse(localStorage.getItem('2r_tagihan') || '[]');
    var sudahAda = false;
    for (var i = 0; i < dataTagihan.length; i++) {
        if (dataTagihan[i].akunId === user.id &&
            dataTagihan[i].bulan === bulanIni &&
            dataTagihan[i].tahun === tahunIni) {
            sudahAda = true;
            break;
        }
    }
    if (sudahAda) return;

    var jumlahTagihan = 0;
    if (user.role === 'toko' || user.role === 'pedagang' || user.role === 'codseller') {
        jumlahTagihan = hitungTagihanToko(user.id, bulanIni, tahunIni);
    } else if (user.role === 'ojek') {
        jumlahTagihan = hitungTagihanOjek(user.id, bulanIni, tahunIni);
    }

    if (jumlahTagihan > 0) {
        dataTagihan.push({
            id: 'TAG-' + Date.now(),
            akunId: user.id,
            bulan: bulanIni,
            tahun: tahunIni,
            jumlahTagihan: jumlahTagihan,
            status: 'BELUM_BAYAR'
        });
        localStorage.setItem('2r_tagihan', JSON.stringify(dataTagihan));
        tampilkanToast('Tagihan bulan ' + bulanIni + '/' + tahunIni + ' telah dibuat: Rp ' + jumlahTagihan.toLocaleString('id-ID'), 'info');
    }
}

// ---------- CEK DAN EKSEKUSI SUSPEN ----------
function cekDanEksekusiSuspen() {
    var user = JSON.parse(localStorage.getItem('2r_user') || '{}');
    if (!user.id) return;

    var sekarang = new Date();
    var hariIni = sekarang.getDate();
    var bulanIni = sekarang.getMonth() + 1;
    var tahunIni = sekarang.getFullYear();

    if (hariIni < 10) return; // Belum waktunya suspensi

    var dataAkun = getDataAkun();
    var userData = null;
    for (var i = 0; i < dataAkun.length; i++) {
        if (dataAkun[i].id === user.id) { userData = dataAkun[i]; break; }
    }
    if (!userData) return;

    var dataTagihan = JSON.parse(localStorage.getItem('2r_tagihan') || '[]');
    var tagihanBulanIni = null;
    for (var i = 0; i < dataTagihan.length; i++) {
        if (dataTagihan[i].akunId === user.id &&
            dataTagihan[i].bulan === bulanIni &&
            dataTagihan[i].tahun === tahunIni) {
            tagihanBulanIni = dataTagihan[i];
            break;
        }
    }

    if (tagihanBulanIni && tagihanBulanIni.status === 'BELUM_BAYAR') {
        if (userData.status !== 'SUSPEN') {
            userData.status = 'SUSPEN';
            for (var i = 0; i < dataAkun.length; i++) {
                if (dataAkun[i].id === user.id) {
                    dataAkun[i].status = 'SUSPEN';
                    break;
                }
            }
            localStorage.setItem('2r_user', JSON.stringify(userData));
            simpanDataAkun(dataAkun);
            tampilkanToast('Akun Anda telah di SUSPEN karena tagihan belum dibayar.', 'error');
            location.reload();
        }
    } else {
        if (userData.status === 'SUSPEN' && tagihanBulanIni && tagihanBulanIni.status === 'LUNAS') {
            userData.status = 'AKTIF';
            for (var i = 0; i < dataAkun.length; i++) {
                if (dataAkun[i].id === user.id) {
                    dataAkun[i].status = 'AKTIF';
                    break;
                }
            }
            localStorage.setItem('2r_user', JSON.stringify(userData));
            simpanDataAkun(dataAkun);
            tampilkanToast('Selamat! Akun Anda telah kembali AKTIF.', 'success');
            location.reload();
        }
    }
}

// ---------- UPGRADE KE PRO (TOKO) ----------
function upgradeKePro() {
    var user = JSON.parse(localStorage.getItem('2r_user') || '{}');
    var dataAkun = getDataAkun();
    var userData = null;
    for (var i = 0; i < dataAkun.length; i++) {
        if (dataAkun[i].id === user.id) { userData = dataAkun[i]; break; }
    }
    if (!userData) { tampilkanToast('Data akun tidak ditemukan!', 'error'); return; }
    if (userData.isPro) { tampilkanToast('Anda sudah menjadi Akun Pro!', 'info'); return; }

    if (!confirm('Anda akan melakukan upgrade ke Akun Pro dengan biaya Rp ' + getHargaProToko().toLocaleString('id-ID') + '. Lanjutkan?')) return;

    userData.isPro = true;
    userData.status = 'AKTIF';
    for (var i = 0; i < dataAkun.length; i++) {
        if (dataAkun[i].id === user.id) {
            dataAkun[i].isPro = true;
            dataAkun[i].status = 'AKTIF';
            break;
        }
    }
    simpanDataAkun(dataAkun);
    var userLogin = JSON.parse(localStorage.getItem('2r_user'));
    userLogin.isPro = true;
    userLogin.status = 'AKTIF';
    localStorage.setItem('2r_user', JSON.stringify(userLogin));

    var sekarang = new Date();
    var bulanIni = sekarang.getMonth() + 1;
    var tahunIni = sekarang.getFullYear();
    var dataTagihan = JSON.parse(localStorage.getItem('2r_tagihan') || '[]');
    var sudahAda = false;
    for (var i = 0; i < dataTagihan.length; i++) {
        if (dataTagihan[i].akunId === user.id && dataTagihan[i].bulan === bulanIni && dataTagihan[i].tahun === tahunIni) {
            sudahAda = true;
            break;
        }
    }
    if (!sudahAda) {
        dataTagihan.push({ id: 'TAG-' + Date.now(), akunId: user.id, bulan: bulanIni, tahun: tahunIni, jumlahTagihan: getHargaProToko(), status: 'BELUM_BAYAR' });
        localStorage.setItem('2r_tagihan', JSON.stringify(dataTagihan));
    }

    tampilkanToast('Selamat! Anda kini menjadi Akun PRO.', 'success');
    renderStatusAkunGabungan();
}

// ---------- UPGRADE OJEK KE PRO ----------
function upgradeOjekKePro() {

    var dataAkun = getDataAkun();
    var userData = null;
    for (var i = 0; i < dataAkun.length; i++) {
        if (dataAkun[i].id === user.id) { userData = dataAkun[i]; break; }
    }
    if (!userData) { tampilkanToast('Data akun tidak ditemukan!', 'error'); return; }
    if (userData.isOjekPro) { tampilkanToast('Anda sudah menjadi Ojek Pro!', 'info'); return; }

    if (!confirm('Anda akan upgrade ke Ojek Pro dengan biaya Rp ' + getHargaProOjek().toLocaleString('id-ID') + '/bulan + fee per order. Lanjutkan?')) return;

    userData.isOjekPro = true;
    userData.status = 'AKTIF';
    for (var i = 0; i < dataAkun.length; i++) {
        if (dataAkun[i].id === user.id) {
            dataAkun[i].isOjekPro = true;
            dataAkun[i].status = 'AKTIF';
            break;
        }
    }
    simpanDataAkun(dataAkun);
    var userLogin = JSON.parse(localStorage.getItem('2r_user'));
    userLogin.isOjekPro = true;
    userLogin.status = 'AKTIF';
    localStorage.setItem('2r_user', JSON.stringify(userLogin));

    var sekarang = new Date();
    var bulanIni = sekarang.getMonth() + 1;
    var tahunIni = sekarang.getFullYear();
    var dataTagihan = JSON.parse(localStorage.getItem('2r_tagihan') || '[]');
    var sudahAda = false;
    for (var i = 0; i < dataTagihan.length; i++) {
        if (dataTagihan[i].akunId === user.id && dataTagihan[i].bulan === bulanIni && dataTagihan[i].tahun === tahunIni) {
            sudahAda = true;
            break;
        }
    }
    if (!sudahAda) {
        dataTagihan.push({ id: 'TAG-' + Date.now(), akunId: user.id, bulan: bulanIni, tahun: tahunIni, jumlahTagihan: getHargaProOjek(), status: 'BELUM_BAYAR' });
        localStorage.setItem('2r_tagihan', JSON.stringify(dataTagihan));
    }

    tampilkanToast('Selamat! Anda kini menjadi Ojek PRO.', 'success');
    renderStatusAkunGabungan();
}

// ---------- KONFIRMASI PEMBAYARAN ----------
function konfirmasiPembayaran() {
    if (!confirm('Apakah Anda yakin sudah melakukan pembayaran? (Ini adalah simulasi, untuk demo)')) return;
    var user = JSON.parse(localStorage.getItem('2r_user') || '{}');
    var dataAkun = getDataAkun();
    var dataTagihan = JSON.parse(localStorage.getItem('2r_tagihan') || '[]');
    for (var i = 0; i < dataTagihan.length; i++) {
        if (dataTagihan[i].akunId === user.id && dataTagihan[i].status === 'BELUM_BAYAR') {
            dataTagihan[i].status = 'LUNAS';
            break;
        }
    }
    for (var i = 0; i < dataAkun.length; i++) {
        if (dataAkun[i].id === user.id) {
            dataAkun[i].status = 'AKTIF';
            break;
        }
    }
    localStorage.setItem('2r_tagihan', JSON.stringify(dataTagihan));
    simpanDataAkun(dataAkun);
    var userLogin = JSON.parse(localStorage.getItem('2r_user'));
    userLogin.status = 'AKTIF';
    localStorage.setItem('2r_user', JSON.stringify(userLogin));
    tampilkanToast('Pembayaran berhasil dikonfirmasi! Akun Anda sudah kembali AKTIF.', 'success');
    location.reload();
}

function renderRiwayatOrderOjekAdmin() {

    var areaKonten = document.getElementById('mainContent');
    var dataOrder = getOrderOjek();
    var dataAkun = getDataAkun();

    // Filter order yang bisa ditagih (sedang diantar atau selesai)
    var orderTagihan = dataOrder.filter(function(o) {
        return o.status === 'SEDANG_DIANTAR' || o.status === 'SELESAI';
    });

    // Sorting: terbaru di atas
    orderTagihan.sort(function(a, b) {
        return new Date(b.createdAt) - new Date(a.createdAt);
    });

    // --- Bangun HTML ---
    var html = `
    <div class="page-header">
        <h2><i class="fas fa-history" style="color:#FF6B00;"></i> Riwayat Order Ojek</h2>
        <p>Daftar semua order ojek yang telah selesai atau sedang diantar. Digunakan sebagai bukti penagihan fee.</p>

            <div>
                <label style="font-size:12px; font-weight:600;">Filter Status:</label>
                <select id="filterStatusOjekAdmin" class="form-input" style="width:150px;" onchange="filterRiwayatOjekAdmin()">
                    <option value="semua">Semua</option>
                    <option value="SEDANG_DIANTAR">Sedang Diantar</option>
                    <option value="SELESAI">Selesai</option>
                </select>
            </div>
            <div>
                <label style="font-size:12px; font-weight:600;">Cari ID Ojek:</label>
                <input type="text" id="searchOjekAdmin" class="form-input" placeholder="Ketik ID Ojek..." style="width:200px;" oninput="filterRiwayatOjekAdmin()">
            </div>
            <div style="display:flex; align-items:flex-end;">
                <span style="font-size:13px; color:#888;">Total: <strong id="totalOrderOjekAdmin">${orderTagihan.length}</strong> order</span>
            </div>
        </div>

        <div class="table-container">

                    <tr>
                        <th>ID Order</th>
                        <th>ID Toko</th>
                        <th>Customer</th>
                        <th>ID Ojek</th>
                        <th>Total Tagihan</th>
                        <th>Status</th>
                        <th>Tanggal</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="tbodyRiwayatOjekAdmin">
    `;

        html += `<tr><td colspan="8" style="text-align:center; padding:30px; color:#888;">Belum ada order ojek yang selesai atau sedang diantar.</td></tr>`;
    } else {
        for (var i = 0; i < orderTagihan.length; i++) {
            var o = orderTagihan[i];
            var namaToko = o.tokoId;
            var namaOjek = o.ojekId || '-';
            // Cari nama toko dan ojek dari dataAkun
            for (var k = 0; k < dataAkun.length; k++) {
                if (dataAkun[k].id === o.tokoId) namaToko = dataAkun[k].nama || dataAkun[k].username;
                if (dataAkun[k].id === o.ojekId) namaOjek = dataAkun[k].nama || dataAkun[k].username;
            }
            var badgeStatus = o.status === 'SELESAI' ? 'badge-success' : 'badge-warning';
            var teksStatus = o.status === 'SELESAI' ? 'Selesai' : 'Sedang Diantar';

            html += `
            <tr>
                <td><strong>${o.id}</strong></td>

    var html = `

        <div class="modal" style="max-width:600px; max-height:80vh; overflow-y:auto;">
            <div class="modal-header">
                <h3>Detail Order: ${order.id}</h3>
                <button class="modal-close" onclick="tutupModalDetailOrderAdmin()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="grid-2">
                    <div><strong>ID Toko:</strong> ${order.tokoId}</div>

                    <div><strong>Customer:</strong> ${escapeHtml(order.namaCustomer)}</div>

                    <div><strong>Total Barang:</strong> Rp ${order.totalBarang.toLocaleString('id-ID')}</div>

                    <div><strong>Ongkir:</strong> Rp ${order.ongkir.toLocaleString('id-ID')}</div>
                    <div><strong>Total Tagihan:</strong> <strong style="color:#FF6B00;">Rp ${order.totalTagihan.toLocaleString('id-ID')}</strong></div>
                    <div><strong>Status:</strong> <span class="badge ${order.status === 'SELESAI' ? 'badge-success' : 'badge-warning'}">${order.status}</span></div>
                    <div><strong>Tanggal Order:</strong> ${new Date(order.createdAt).toLocaleString('id-ID')}</div>
                    ${order.catatan ? `<div style="grid-column:1/-1;"><strong>Catatan:</strong> ${escapeHtml(order.catatan)}</div>` : ''}
                </div>
                <div style="margin-top:15px; border-top:1px solid #eee; padding-top:10px;">
                    <p style="font-size:13px; color:#888;">* Komisi fee per order untuk ojek ini: <strong>Rp ${getFeeOrderOjek().toLocaleString('id-ID')}</strong></p>

                <button class="button button-secondary" onclick="tutupModalDetailOrderAdmin()">Tutup</button>

        </div>
    </div>

    var body = document.body;

    container.innerHTML = html;
    body.appendChild(container);
}

function tutupModalDetailOrderAdmin() {
    var modal = document.getElementById('modalDetailOrderAdmin');
    if (modal) modal.remove();
}

// --- Fungsi filter (dipanggil dari dropdown/input) ---
function filterRiwayatOjekAdmin() {
    var filterStatus = document.getElementById('filterStatusOjekAdmin').value;
    var searchOjek = document.getElementById('searchOjekAdmin').value.toLowerCase().trim();
    var dataOrder = getOrderOjek();
    var dataAkun = getDataAkun();

    var filtered = dataOrder.filter(function(o) {
        return o.status === 'SEDANG_DIANTAR' || o.status === 'SELESAI';
    });

    if (filterStatus !== 'semua') {
        filtered = filtered.filter(function(o) { return o.status === filterStatus; });
    }

    if (searchOjek !== '') {
        filtered = filtered.filter(function(o) {
            return (o.ojekId && o.ojekId.toLowerCase().includes(searchOjek));
        });
    }

    filtered.sort(function(a, b) {
        return new Date(b.createdAt) - new Date(a.createdAt);
    });

    document.getElementById('totalOrderOjekAdmin').textContent = filtered.length;

    var tbody = document.getElementById('tbodyRiwayatOjekAdmin');
    var html = '';
    if (filtered.length === 0) {
        html = `<tr><td colspan="8" style="text-align:center; padding:30px; color:#888;">Tidak ada order yang cocok dengan filter.</td></tr>`;
    } else {
        for (var i = 0; i < filtered.length; i++) {
            var o = filtered[i];
            var namaToko = o.tokoId;
            var namaOjek = o.ojekId || '-';
            for (var k = 0; k < dataAkun.length; k++) {
                if (dataAkun[k].id === o.tokoId) namaToko = dataAkun[k].nama || dataAkun[k].username;
                if (dataAkun[k].id === o.ojekId) namaOjek = dataAkun[k].nama || dataAkun[k].username;
            }
            var badgeStatus = o.status === 'SELESAI' ? 'badge-success' : 'badge-warning';
            var teksStatus = o.status === 'SELESAI' ? 'Selesai' : 'Sedang Diantar';
            html += `
            <tr>
                <td><strong>${o.id}</strong></td>
                <td>${escapeHtml(namaToko)}</td>
                <td>${escapeHtml(o.namaCustomer)}</td>
                <td>${escapeHtml(namaOjek)}</td>
                <td>Rp ${o.totalTagihan.toLocaleString('id-ID')}</td>
                <td><span class="badge ${badgeStatus}">${teksStatus}</span></td>
                <td>${new Date(o.createdAt).toLocaleDateString('id-ID')}</td>
                <td>
                    <button class="button button-primary button-extra-small" onclick="detailOrderOjekAdmin('${o.id}')"><i class="fas fa-eye"></i> Detail</button>
                </td>
            </tr>
            `;
        }
    }
    tbody.innerHTML = html;
}
